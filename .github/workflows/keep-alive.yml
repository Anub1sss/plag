name: Keep Codespace Alive

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    if: ${{ vars.CODESPACE_URL != '' }}
    steps:
      - name: Ping Codespace
        run: |
          URL="${{ vars.CODESPACE_URL }}"
          # Убираем trailing slash если есть
          URL="${URL%/}"

          echo "Pinging: $URL"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            "$URL" 2>/dev/null || echo "fail")

          echo "Response: $STATUS"

          if [ "$STATUS" = "fail" ] || [ "$STATUS" = "000" ]; then
            echo "::warning::Codespace may be sleeping or URL is invalid"
          else
            echo "Codespace is alive (HTTP $STATUS)"
          fi
